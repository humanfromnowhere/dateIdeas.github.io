<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 DATE IDEAS</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay"></div> <header>
  <span class="cat-logo">😼</span>
  <h1><span>DATE IDEAS</span></h1>
  <p class="subtitle">spin the wheel & plan something special 🐾</p>
</header>

<div class="randomizer">
  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" onclick="setFilter('All')" id="filter-All">🐾 All</button>
  </div>
  <div class="result-card" id="resultCard">
    <div class="result-placeholder">Press the button to get a date idea! 🐾</div>
  </div>
  <button class="spin-btn" onclick="spinDate()">🎲 Surprise Me!</button>
</div>

<div class="section">
  <div class="section-title">📋 All Date Ideas</div>
  <div id="ideasContainer"></div>

    <div class="add-form">
    <h3>🐾 Add a New Date Idea</h3>
    <div class="form-row">
      <input class="form-input" id="newDateName" placeholder="e.g. Bowling night 🎳" />
      <select class="form-select" id="newDateCat"></select>
      <button class="add-btn" onclick="addDate()">+ Add</button>
    </div>
  </div>
</div>

<div class="done-section">
  <button class="done-toggle" onclick="toggleDone()">✅ Dates We've Done (<span id="doneCount">0</span>)</button>
  <div class="done-list" id="doneList"></div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
